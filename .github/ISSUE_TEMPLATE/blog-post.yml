name: "\U0001F4DD ブログ記事リクエスト / Blog Post Request"
description: "トピックを入力すると、AI が記事を自動生成します"
labels: ["blog-post"]
body:
  - type: input
    id: topic
    attributes:
      label: "トピック / Topic"
      description: "記事のテーマを簡潔に書いてください"
      placeholder: "例: TypeScript の型パズル入門"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: "詳細・補足 / Details"
      description: "記事に含めたい内容、対象読者、技術レベルなどがあれば書いてください"
      placeholder: |
        - 対象読者: TypeScript 初心者〜中級者
        - 含めたい内容: Conditional Types, Template Literal Types
        - コード例を多めに
    validations:
      required: false
  - type: dropdown
    id: language
    attributes:
      label: "言語 / Language"
      options:
        - "日英両方 / Both (ja + en)"
        - "日本語のみ / Japanese only"
        - "英語のみ / English only"
    validations:
      required: true
